<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alimentador de Pets</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4; }
        
        /* Estilo idêntico ao exemplo do seu professor */
        .header-container {
            background-color: #fceeb5; /* Amarelo da foto */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .top-row {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            width: 70px;
            height: 70px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .titulo {
            background-color: white;
            padding: 10px 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        nav {
            display: flex;
            gap: 25px;
            background-color: white;
            padding: 10px 15px;
            width: fit-content;
        }

        nav a {
            text-decoration: none;
            color: black;
            font-weight: 500;
            font-size: 18px;
        }

        .conteudo {
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="top-row">
            <div class="logo">
                <span style="font-size: 40px;">🐾</span>
            </div>
            <div class="titulo">PROJETO ALIMENTADOR DE PETS</div>
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Plataforma</a>
            <a href="#">Dispositivo</a>
            <a href="#">Aplicativo</a>
        </nav>
    </header>

    <main class="conteudo">
        <h1>Bem-vindo à GitPage do Projeto</h1>
        <p>Esta página será usada para documentar o desenvolvimento do alimentador automático.</p>
    </main>

</body>
</html>
